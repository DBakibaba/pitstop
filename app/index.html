<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitStop</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: #f5a623;
            margin-bottom: 8px;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        button {
            background: #f5a623;
            color: #000;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e0951f;
        }

        #results {
            margin-top: 30px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid #f5a623;
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .card p {
            color: #aaaaaa;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .distance {
            color: #f5a623;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1> PitStop</h1>
    <p>Find the nearest washroom while you drive</p>
    <button onclick="findWashroom()">Find Nearest Washroom</button>
    <div id="results"></div>
    <div id="map" style="width:100%; max-width:500px; height:300px; border-radius:10px; margin-top:20px;"></div>

    <script>
        const map = L.map('map').setView([43.7001, -79.4163], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        async function findWashroom() {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                L.circleMarker([lat, lon], {
                    radius: 10,
                    fillColor: "#FFF444",
                    color: "#fff",
                    fillOpacity: 1
                }).bindPopup("You are here").addTo(map);
                const response = await fetch("/find-washroom", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ latitude: lat, longitude: lon })
                });

                const data = await response.json();
                displayResults(data);
            });
        }

        function displayResults(washrooms) {
            const div = document.getElementById("results");
            div.innerHTML = washrooms.map(w => `
                <div class="card">
                    <h3>${w.name}</h3>
                    <p>${w.address || 'Address not available'}</p>
                    <p class="distance">${w.distance_km} km away</p>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${w.latitude},${w.longitude}"
                    target="_blank"
                    >
                    Navigate</a>
                </div>
            `).join("");
            // clear old markers
            map.eachLayer(layer => {
                if (layer instanceof L.Marker) map.removeLayer(layer);
            });

            // add user location marker
            L.marker([washrooms[0].latitude, washrooms[0].longitude])
                .addTo(map);

            // add washroom pins
            washrooms.forEach(w => {
                L.marker([w.latitude, w.longitude])
                    .bindPopup(`<b>${w.name}</b><br>${w.distance_km} km away`)
                    .addTo(map);
            });

            // center map on first result
            map.setView([washrooms[0].latitude, washrooms[0].longitude], 14);
        }

    </script>
</body>

</html>
